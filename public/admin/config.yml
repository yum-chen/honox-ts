# Singletons - Single-instance config files, edited as one entry (not a list)
# Docs: https://sveltiacms.app/en/docs/collections/singletons
singletons:
  - name: configs
    label: Configs
    i18n: true
    # {{locale}} placeholder — required for i18n on file collections/singletons
    # (the top-level i18n.structure option only applies to folder-based entry
    # collections). Resolves to content/configs.json for the default locale
    # (en, omitted per omit_default_locale_from_file_path) and
    # content/configs.zh.json / content/configs.es.json for translations.
    file: content/configs.{{locale}}.json
    fields:
      - label: Collections
        name: collections
        widget: list
        required: false
        i18n: duplicate
        hint: "Maps each content/<folder> collection (e.g. docs, components) to a sidenav label and, if it differs from the folder name, a CMS collection slug for the doc's Edit link. A folder with no entry here falls back to its capitalised name for both."
        fields:
          - label: Folder
            name: folder
            widget: string
            hint: "Folder name under content/, e.g. docs or components."
          - label: Label
            name: label
            widget: string
            required: false
            hint: "Sidenav/section label. Defaults to the capitalised folder name."
          - label: CMS Collection
            name: cmsCollection
            widget: string
            required: false
            hint: "Overrides the Edit link's CMS collection slug if it differs from the folder name."
      - label: Groups
        name: groups
        widget: list
        i18n: true
        hint: "Controls the docs sidenav: order = top-to-bottom group order. Each group collects every doc matching its Section and/or Category (both must match if both are set). Section/Category are matching keys and must stay in English (identical across locales) — only Label is translated per locale."
        fields:
          - { label: Label, name: label, widget: string, i18n: true }
          - label: Section
            name: section
            widget: string
            required: false
            i18n: duplicate
            hint: "Claim every doc from a whole collection by its section label (see Collections above), e.g. Guides. Matching key — keep in English, identical across locales."
          - label: Category
            name: category
            widget: select
            options: *component_categories
            required: false
            i18n: duplicate
            hint: "Claim docs by their Category field (Components collection only). Matching key — keep in English, identical across locales (the Category field itself is i18n: duplicate, so it's always English regardless of doc locale)."
      - label: Doc Order
        name: docOrder
        widget: list
        required: false
        i18n: duplicate
        hint: "Explicit sidenav order within each group above, by doc slug (filename without extension, e.g. Introduction, Getting-Started, Architecture). Docs not listed here keep the default alphabetical order, appended after the ones listed. Matching key — keep in English, identical across locales."
      - label: Fallback Group Label
        name: fallbackLabel
        widget: string
        default: Other
        required: false
        i18n: true
        hint: "Label for any doc that doesn't match a group above."
      - label: Links
        name: links
        widget: list
        required: false
        i18n: true
        hint: "Plain links shown at the bottom of the sidenav, e.g. the GitHub repo."
        fields:
          - { label: Label, name: label, widget: string, i18n: true }
          - { label: URL, name: href, widget: string, i18n: duplicate }
      - label: Header Links
        name: headerLinks
        widget: list
        required: false
        i18n: true
        hint: "Plain links shown in the header nav on both the docs and blog sections, e.g. Blog and Docs."
        fields:
          - { label: Label, name: label, widget: string, i18n: true }
          - { label: URL, name: href, widget: string, i18n: duplicate }
      - label: Hydration Tier Labels
        name: hydrationTiers
        widget: list
        required: false
        i18n: true
        hint: "Translated badge labels for a doc's numeric hydration tier. `Tier` is the matching key (keep identical across locales); `Label` is the translated, locale-specific badge text."
        fields:
          - { label: Tier, name: tier, widget: number, i18n: duplicate }
          - { label: Label, name: label, widget: string, i18n: true }
      - label: Docs UI
        name: docsUi
        widget: object
        required: false
        i18n: true
        hint: "Page-chrome copy for the docs search box and header Edit/Admin buttons. Not doc content, so it lives here instead — every field is fully translated per locale."
        fields:
          - label: Search Placeholder
            name: searchPlaceholder
            widget: string
            required: false
            default: "Search docs..."
            i18n: true
          - label: Search Result Item Label
            name: searchItemLabel
            widget: string
            required: false
            default: docs
            i18n: true
            hint: "Noun used in the search result count, e.g. docs."
          - label: Edit Button
            name: edit
            widget: string
            required: false
            default: Edit
            i18n: true
          - label: Admin Button
            name: admin
            widget: string
            required: false
            default: Admin
            i18n: true
          - label: Mobile Menu Toggle
            name: menu
            widget: string
            required: false
            default: Menu
            i18n: true
            hint: "Label for the mobile disclosure that expands into the sidenav."
