                types: *nestable_components

          - label: HoverCard
            name: hovercard
            widget: object
            fields:
              - { label: Trigger Text, name: triggerText, widget: string, required: false }
              - { label: Title, name: title, widget: string, required: false }
              - { label: Description, name: description, widget: string, required: false }
              - { label: Show Arrow, name: showArrow, widget: boolean, default: false }
              - { label: Interactive, name: interactive, widget: boolean, default: true }
              - label: Children
                name: children
                widget: list
                types: *nestable_components
                required: false

          - label: Popover
            name: popover
            widget: object
            fields:
              - { label: Trigger Text, name: triggerText, widget: string, required: false }
              - { label: Title, name: title, widget: string, required: false }
              - { label: Description, name: description, widget: string, required: false }
              - { label: Body, name: body, widget: string, required: false }
              - { label: Footer, name: footer, widget: string, required: false }
              - { label: Show Arrow, name: showArrow, widget: boolean, default: true }
              - { label: Closable, name: closable, widget: boolean, default: true }
              - { label: Interactive, name: interactive, widget: boolean, default: true }
              - label: Children
                name: children
                widget: list
                types: *nestable_components
                required: false

          # ==========================================
          # LEAVES AND OTHER COMPONENTS AT ROOT
          # ==========================================
          - label: Button
            name: button
            widget: object
            fields: *button_fields
          - label: Badge
            name: badge
            widget: object
            fields: *badge_fields
          - label: Alert
