# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json

# Sveltia CMS Configuration
# Documentation: https://sveltiacms.app/en/docs/config-basics

# Internationalisation (i18n)
# structure: multiple_folders matches the actual content layout — translated
# files live under content/<collection>/<locale>/... (e.g.
# content/docs/zh/Hydration.md) alongside the default-locale files at
# content/docs/Hydration.md (per omit_default_locale_from_file_path below).
i18n:
  structure: multiple_folders
  locales: [en, zh, es, pt, fr, de]
  default_locale: en
  omit_default_locale_from_file_path: true

# Backend Configuration
# Options: github, gitlab, gitea
# Update with your repository details
backend:
  name: github
  repo: yum-chen/honox-ts
  branch: main  # or master, depending on your default branch

# Media Storage
# Media files will be stored in /public/media and accessible at /media
media_folder: /public/media
public_folder: /media

# Collections - Define your content types here
collections:
  - name: posts
    label: Posts
    label_singular: Post
    folder: /content/posts
    create: true
    slug: "{{slug}}"
    summary: "{{title}} — {{date}}"
    sortable_fields: [title, date]
    i18n: true
    view_filters:
      - label: Drafts
        field: draft
        pattern: true
      - label: Published
        field: draft
        pattern: false
    view_groups:
      - label: Year
        field: date
        pattern: '\d{4}'
    fields:
      - { label: Title, name: title, widget: string, i18n: true }
      - { label: Date, name: date, widget: datetime, type: date, default: "", i18n: duplicate }
      - { label: Description, name: description, widget: string, i18n: true }
      - { label: Body, name: body, widget: markdown, i18n: true }
      # Field name must stay `cover` — app/routes/blog.tsx reads data.cover
      - label: Cover Image
        name: cover
        widget: image
        required: false
        i18n: duplicate
      - label: Author
        name: author
        widget: string
        required: false
        default: Artefact Team
        i18n: duplicate
      - label: Read Time
        name: readTime
        widget: string
        required: false
        hint: "e.g. 5 min read"
        i18n: duplicate
      - label: Tags
        name: tags
        widget: list
        required: false
        i18n: duplicate
      - label: Draft
        name: draft
        widget: boolean
        default: false
        i18n: duplicate

  - name: docs
    label: Docs
    label_singular: Doc
    folder: /content/docs
    extension: md
    format: frontmatter
    create: true
    slug: "{{slug}}"
    summary: "{{title}}"
    sortable_fields: [title]
    i18n: true
    fields:
      - { label: Title, name: title, widget: string, i18n: true }
      - { label: Body, name: body, widget: markdown, i18n: true }

  - name: components
    label: Components
    label_singular: Component
    folder: /content/components
    extension: mdx
    format: frontmatter
    create: true
    slug: "{{slug}}"
    summary: "{{title}} — {{category}}"
    sortable_fields: [title, category, hydration-tier]
    i18n: true
    view_groups:
      - label: Category
        field: category
      - label: Hydration Tier
        field: hydration-tier
    fields:
      - { label: Title, name: title, widget: string, i18n: true }
      - label: Hydration Tier
        name: hydration-tier
        widget: select
        options: ["Tier 1", "Tier 2", "Tier 3"]
        hint: "Tier 1 = auto-interactive, Tier 2 = smart auto-detect, Tier 3 = presentational (never hydrates). See /docs/Hydration."
        required: false
        i18n: duplicate
      - label: Category
        name: category
        widget: select
        options: &component_categories [Layout, Typography, Navigation, Feedback, "Data Display", Forms, Overlays]
        required: false
        i18n: duplicate
      - { label: Body, name: body, widget: markdown, i18n: true }

  - name: pages
    label: Pages
    label_singular: Page
    folder: content/pages
    extension: json
    format: json
    create: true
    slug: "{{slug}}"
    i18n: true
    fields:
      - { label: Title, name: title, widget: string, i18n: true }
      - label: Content
        name: content
        widget: list
        i18n: true
        types: &root_components
          # ==========================================
          # 1. STACK
          # ==========================================
          - label: Stack
            name: stack
            widget: object
            fields:
              - &stack_direction { label: Direction, name: direction, widget: select, options: [horizontal, vertical], default: horizontal }
              - &stack_align { label: Align, name: align, widget: select, options: [start, center, end, stretch, baseline], required: false }
              - &stack_justify { label: Justify, name: justify, widget: select, options: [start, center, end, between, around, evenly], required: false }
              - &stack_gap { label: Gap, name: gap, widget: select, options: ["0", "0.5", "1", "1.5", "2", "2.5", "3", "4", "5", "6", "7", "8", "9", "10", "12", "14", "16", "20"], default: "2" }
              - &layout_style_margin { label: Margin, name: margin, widget: string, required: false, hint: "CSS margin shorthand, e.g. \"2rem 0\". 1-4 space-separated values (px/rem/em/%/0/auto)." }
              - &layout_style_padding { label: Padding, name: padding, widget: string, required: false, hint: "CSS padding shorthand, e.g. \"1rem 2rem\". 1-4 space-separated values (px/rem/em/%/0/auto)." }
              - &layout_style_max_width { label: Max Width, name: maxWidth, widget: string, required: false, hint: "e.g. \"64rem\", \"1200px\", \"90%\"." }
              - &layout_style_border_radius { label: Border Radius, name: borderRadius, widget: string, required: false, hint: "e.g. \"1rem\", \"12px\"." }
              - &layout_style_background_color { label: Background Color, name: backgroundColor, widget: string, required: false, hint: "Hex, rgb()/rgba(), or a CSS color name." }
              - &layout_style_background_image { label: Background Image URL, name: backgroundImage, widget: string, required: false, hint: "Must be an https:// URL." }
              - &layout_style_background_fit { label: Background Fit, name: backgroundFit, widget: select, options: [cover, contain, auto], required: false, hint: "Only applies when Background Image is set." }
              - &layout_style_text_align { label: Text Align, name: textAlign, widget: select, options: [left, center, right, justify, start, end], required: false }
              - &layout_style_opacity { label: Opacity, name: opacity, widget: number, value_type: float, min: 0, max: 1, step: 0.1, required: false }
              - &layout_style_box_shadow { label: Box Shadow, name: boxShadow, widget: select, options: [none, "2xs", xs, sm, md, lg, xl, "2xl"], required: false }
              - label: Children
                name: children
                widget: list
                types: &nestable_components
                  # Inside Level 1 containers, we can have another layer of containers or leaves
                  - label: Stack
                    name: stack
                    widget: object
                    fields:
                      - *stack_direction
                      - *stack_align
                      - *stack_justify
                      - *stack_gap
                      - *layout_style_margin
                      - *layout_style_padding
                      - *layout_style_max_width
                      - *layout_style_border_radius
                      - *layout_style_background_color
                      - *layout_style_background_image
                      - *layout_style_background_fit
                      - *layout_style_text_align
                      - *layout_style_opacity
                      - *layout_style_box_shadow
                      - label: Children
                        name: children
                        widget: list
                        types: &leaf_components
                          # Level 3: Non-container components (Leaves)
                          - label: Button
                            name: button
                            widget: object
                            fields: &button_fields
                              - { label: Text, name: text, widget: string }
                              - label: Variant
                                name: variant
                                widget: select
                                options: [solid, outline, subtle, surface, plain]
                                default: solid
                              - label: Color Palette
                                name: colorPalette
                                widget: select
                                options: [blue, green, red, purple, orange, amber, cyan, slate]
                                required: false
                              - label: Size
                                name: size
                                widget: select
                                options: [xs, sm, md, lg]
                                default: md
                              - label: Type
                                name: type
                                widget: select
                                options: [button, submit, reset]
                                default: button
                                hint: "Use \"submit\" for a button inside a Fieldset that should submit its form."
                          - label: Badge
                            name: badge
                            widget: object
                            fields: &badge_fields
                              - { label: Text, name: text, widget: string }
                              - label: Variant
                                name: variant
                                widget: select
                                options: [solid, subtle, outline, surface]
                                default: solid
                              - label: Color Palette
                                name: colorPalette
                                widget: select
                                options: [blue, green, red, purple, orange, amber, cyan, slate]
                                required: false
                              - label: Size
                                name: size
                                widget: select
                                options: [sm, md, lg]
                                default: md
                          - label: Alert
                            name: alert
                            widget: object
                            fields: &alert_fields
                              - { label: Title, name: title, widget: string }
                              - { label: Description, name: description, widget: string, required: false }
                              - label: Status
                                name: status
                                widget: select
                                options: [info, success, warning, error]
                                default: info
                              - label: Variant
                                name: variant
                                widget: select
                                options: [subtle, solid, outline, surface]
                                default: subtle
                          - label: Heading
                            name: heading
                            widget: object
                            fields: &heading_fields
                              - { label: Text, name: text, widget: string }
                              - label: Level
                                name: as
                                widget: select
                                options: [h1, h2, h3, h4, h5, h6]
                                default: h2
                              - label: Size
                                name: size
                                widget: select
                                options: [xs, sm, md, lg, xl, 2xl, 3xl, 4xl, 5xl, 6xl, 7xl]
                                default: xl
                          - label: Text
                            name: text
                            widget: object
                            fields: &text_fields
                              - { label: Content, name: content, widget: string }
                              - label: Size
                                name: size
                                widget: select
                                options: [xs, sm, md, lg, xl, 2xl, 3xl, 4xl, 5xl, 6xl, 7xl]
                                default: md
                          - label: Link
                            name: link
                            widget: object
                            fields: &link_fields
                              - { label: Text, name: text, widget: string }
                              - { label: Href, name: href, widget: string }
                              - label: Variant
                                name: variant
                                widget: select
                                options: [underline, plain]
                                default: underline
                              - label: Color Palette
                                name: colorPalette
                                widget: select
                                options: [blue, green, red, purple, orange, amber, cyan, slate]
                                required: false
                              - label: Target
                                name: target
                                widget: select
                                options: ["_blank", "_self", "_parent", "_top"]
                                required: false
                              - { label: Rel, name: rel, widget: string, required: false }
                          - label: Icon
                            name: icon
                            widget: object
                            fields: &icon_fields
                              - label: SVG Markup
                                name: svg
                                widget: text
                                hint: "Raw inner SVG markup, e.g. <path d=\"M12 2 2 7l10 5 10-5-10-5z\" />"
                              - { label: View Box, name: viewBox, widget: string, default: "0 0 24 24" }
                              - { label: Fill, name: fill, widget: string, default: "none", required: false }
                              - { label: Stroke, name: stroke, widget: string, default: "currentColor", required: false }
                              - label: Size
                                name: size
                                widget: select
                                options: [2xs, xs, sm, md, lg, xl]
                                default: md
                              - { label: Accessible Label, name: ariaLabel, widget: string, required: false, hint: "Leave blank for a decorative icon" }
                          - label: Checkbox
                            name: checkbox
                            widget: object
                            fields: &checkbox_fields
                              - { label: Label, name: label, widget: string }
                              - { label: Checked, name: checked, widget: boolean, default: false }
                              - { label: Disabled, name: disabled, widget: boolean, default: false }
                              - { label: Invalid, name: invalid, widget: boolean, default: false }
                              - label: Size
                                name: size
                                widget: select
                                options: [sm, md, lg]
                                default: md
                              - label: Color Palette
                                name: colorPalette
                                widget: select
                                options: [blue, green, red, purple, orange, amber, cyan, slate]
                                required: false
                          - label: Combobox
                            name: combobox
                            widget: object
                            fields: &combobox_fields
                              - { label: Label, name: label, widget: string }
                              - { label: Placeholder, name: placeholder, widget: string, required: false }
                              - label: Items
                                name: items
                                widget: list
                                fields:
                                  - { label: Label, name: label, widget: string }
                                  - { label: Value, name: value, widget: string }
                          - label: Select
                            name: select
                            widget: object
                            fields: &select_fields
                              - { label: Label, name: label, widget: string }
                              - { label: Placeholder, name: placeholder, widget: string, required: false }
                              - { label: Multiple, name: multiple, widget: boolean, default: false }
                              - label: Items
                                name: items
                                widget: list
                                fields:
                                  - { label: Label, name: label, widget: string }
                                  - { label: Value, name: value, widget: string }
                          - label: Field
                            name: field
                            widget: object
                            fields: &field_fields
                              - { label: Label, name: label, widget: string, required: false }
                              - { label: Name, name: name, widget: string, required: false, hint: "HTML name attribute, used when submitting a form." }
                              - { label: Placeholder, name: placeholder, widget: string, required: false }
                              - { label: Helper Text, name: helperText, widget: string, required: false }
                              - { label: Error Text, name: errorText, widget: string, required: false }
                              - { label: Default Value, name: defaultValue, widget: string, required: false }
                              - { label: Disabled, name: disabled, widget: boolean, default: false }
                              - { label: Invalid, name: invalid, widget: boolean, default: false }
                              - { label: Required, name: required, widget: boolean, default: false }
                              - { label: Read Only, name: readOnly, widget: boolean, default: false }
                          - label: Textarea
                            name: textarea
                            widget: object
                            fields: &textarea_fields
                              - { label: Label, name: label, widget: string, required: false }
                              - { label: Name, name: name, widget: string, required: false, hint: "HTML name attribute, used when submitting a form." }
                              - { label: Placeholder, name: placeholder, widget: string, required: false }
                              - { label: Helper Text, name: helperText, widget: string, required: false }
                              - { label: Error Text, name: errorText, widget: string, required: false }
                              - { label: Default Value, name: defaultValue, widget: string, required: false }
                              - { label: Rows, name: rows, widget: number, required: false, value_type: int }
                              - { label: Disabled, name: disabled, widget: boolean, default: false }
                              - { label: Invalid, name: invalid, widget: boolean, default: false }
                              - { label: Required, name: required, widget: boolean, default: false }
                              - { label: Read Only, name: readOnly, widget: boolean, default: false }
                          - label: Fieldset
                            name: fieldset
                            widget: object
                            fields: &fieldset_fields
                              - { label: Legend, name: legend, widget: string, required: false }
                              - { label: Helper Text, name: helperText, widget: string, required: false }
                              - { label: Error Text, name: errorText, widget: string, required: false }
                              - { label: Disabled, name: disabled, widget: boolean, default: false }
                              - { label: Invalid, name: invalid, widget: boolean, default: false }
                              - { label: Required, name: required, widget: boolean, default: false }
                          - label: Group
                            name: group
                            widget: object
                            fields: &group_fields
                              - { label: Attached, name: attached, widget: boolean, default: false }
                              - { label: Grow, name: grow, widget: boolean, default: false }
                              - { label: Orientation, name: orientation, widget: select, options: [horizontal, vertical], default: horizontal }
                          - label: HoverCard
                            name: hoverCard
                            widget: object
                            fields: &hovercard_fields
                              - { label: Trigger Text, name: triggerText, widget: string, default: "Hover me" }
                              - { label: Show Arrow, name: showArrow, widget: boolean, default: false }
                              - { label: Title, name: title, widget: string, required: false }
                              - { label: Description, name: description, widget: string, required: false }
                          - label: Menu
                            name: menu
                            widget: object
                            fields: &menu_fields
                              - { label: Trigger Text, name: triggerText, widget: string, default: "Open Menu" }
                              - label: Items
                                name: items
                                widget: list
                                fields:
                                  - { label: Type, name: type, widget: select, options: [item, separator, checkbox, radio], default: item }
                                  - { label: Label, name: label, widget: string, required: false }
                                  - { label: Value, name: value, widget: string, required: false }
                                  - { label: Disabled, name: disabled, widget: boolean, default: false }
                                  - { label: Checked, name: checked, widget: boolean, default: false }
                          - label: Popover
                            name: popover
                            widget: object
                            fields: &popover_fields
                              - { label: Trigger Text, name: triggerText, widget: string, default: "Click me" }
                              - { label: Title, name: title, widget: string, required: false }
                              - { label: Description, name: description, widget: string, required: false }
                              - { label: Body, name: body, widget: string, required: false }
                              - { label: Footer, name: footer, widget: string, required: false }
                              - { label: Show Arrow, name: showArrow, widget: boolean, default: true }
                              - { label: Closable, name: closable, widget: boolean, default: true }
                          - label: Skeleton
                            name: skeleton
                            widget: object
                            fields: &skeleton_fields
                              - label: Shape
                                name: shape
                                widget: select
                                options: [box, circle, text]
                                default: box
                              - label: Animation
                                name: variant
                                widget: select
                                options: [pulse, shine, none]
                                default: pulse
                              - { label: No Of Lines, name: noOfLines, widget: number, default: 3, required: false }
                              - { label: Loaded, name: loaded, widget: boolean, default: false }
                          - label: Paginated Table
                            name: paginatedTable
                            widget: object
                            fields: &paginatedtable_fields []
                          - label: Pagination
                            name: pagination
                            widget: object
                            fields: &pagination_fields
                              - { label: Count, name: count, widget: number, default: 100 }
                              - { label: Page Size, name: pageSize, widget: number, default: 10, required: false }
                              - { label: Default Page, name: defaultPage, widget: number, default: 1, required: false }
                              - { label: Sibling Count, name: siblingCount, widget: number, default: 1, required: false }
                              - { label: Boundary Count, name: boundaryCount, widget: number, default: 1, required: false }
                          - label: Progress
                            name: progress
                            widget: object
                            fields: &progress_fields
                              - { label: Label, name: label, widget: string, required: false }
                              - { label: Value, name: value, widget: number, default: 50 }
                              - { label: Min, name: min, widget: number, default: 0, required: false }
                              - { label: Max, name: max, widget: number, default: 100, required: false }
                              - { label: Show Value Text, name: showValueText, widget: boolean, default: false }
                              - label: Type
                                name: type
                                widget: select
                                options: [linear, circular]
                                default: linear
                              - label: Color Palette
                                name: colorPalette
                                widget: select
                                options: [blue, green, red, purple, orange, amber, cyan, slate]
                                required: false
                          - label: Radio Group
                            name: radioGroup
                            widget: object
                            fields: &radiogroup_fields
                              - { label: Label, name: label, widget: string, required: false }
                              - { label: Default Value, name: defaultValue, widget: string, required: false }
                              - label: Items
                                name: items
                                widget: list
                                fields:
                                  - { label: Label, name: label, widget: string }
                                  - { label: Value, name: value, widget: string }
                                  - { label: Disabled, name: disabled, widget: boolean, default: false }
                              - label: Size
                                name: size
                                widget: select
                                options: [sm, md, lg]
                                default: md
                              - label: Color Palette
                                name: colorPalette
                                widget: select
                                options: [blue, green, red, purple, orange, amber, cyan, slate]
                                required: false
                          - label: Radio Card Group
                            name: radioCardGroup
                            widget: object
                            fields: &radiocardgroup_fields
                              - { label: Label, name: label, widget: string, required: false }
                              - { label: Default Value, name: defaultValue, widget: string, required: false }
                              - label: Items
                                name: items
                                widget: list
                                fields:
                                  - { label: Label, name: label, widget: string }
                                  - { label: Value, name: value, widget: string }
                                  - { label: Disabled, name: disabled, widget: boolean, default: false }
                              - label: Variant
                                name: variant
                                widget: select
                                options: [outline, subtle, surface, solid]
                                default: outline
                              - label: Color Palette
                                name: colorPalette
                                widget: select
                                options: [blue, green, red, purple, orange, amber, cyan, slate]
                                required: false
                          - label: Editable
                            name: editable
                            widget: object
                            fields: &editable_fields
                              - { label: Label, name: label, widget: string, required: false }
                              - { label: Default Value, name: defaultValue, widget: string, required: false }
                              - { label: Placeholder, name: placeholder, widget: string, required: false }
                              - label: Size
                                name: size
                                widget: select
                                options: ["2xs", xs, sm, md, lg]
                                default: md
                              - label: Activation Mode
                                name: activationMode
                                widget: select
                                options: [focus, click, dblclick, none]
                                default: focus
                              - label: Submit Mode
                                name: submitMode
                                widget: select
                                options: [enter, blur, both, none]
                                default: both
                              - { label: Disabled, name: disabled, widget: boolean, default: false }
                          - label: Segment Group
                            name: segmentGroup
                            widget: object
                            fields: &segmentgroup_fields
                              - { label: Label, name: label, widget: string, required: false }
                              - { label: Default Value, name: defaultValue, widget: string, required: false }
                              - label: Items
                                name: items
                                widget: list
                                fields:
                                  - { label: Label, name: label, widget: string }
                                  - { label: Value, name: value, widget: string }
                                  - { label: Disabled, name: disabled, widget: boolean, default: false }
                          - label: Slider
                            name: slider
                            widget: object
                            fields: &slider_fields
                              - { label: Label, name: label, widget: string, required: false }
                              - { label: Default Value, name: defaultValue, widget: number, default: 30 }
                              - { label: Min, name: min, widget: number, default: 0 }
                              - { label: Max, name: max, widget: number, default: 100 }
                              - { label: Step, name: step, widget: number, default: 1 }
                              - { label: Show Value Text, name: showValueText, widget: boolean, default: false }
                              - label: Color Palette
                                name: colorPalette
                                widget: select
                                options: [blue, green, red, purple, orange, amber, cyan, slate]
                                required: false
                          - label: Switch
                            name: switch
                            widget: object
                            fields: &switch_fields
                              - { label: Label, name: label, widget: string, required: false }
                              - { label: Checked, name: checked, widget: boolean, default: false }
                              - { label: Disabled, name: disabled, widget: boolean, default: false }
                              - { label: Invalid, name: invalid, widget: boolean, default: false }
                              - label: Size
                                name: size
                                widget: select
                                options: [sm, md, lg]
                                default: md
                              - label: Color Palette
                                name: colorPalette
                                widget: select
                                options: [blue, green, red, purple, orange, amber, cyan, slate]
                                required: false
                          - label: Pin Field
                            name: pinField
                            widget: object
                            fields: &pinfield_fields
                              - { label: Label, name: label, widget: string, required: false }
                              - { label: Name, name: name, widget: string, required: false, hint: "HTML name attribute, used when submitting a form." }
                              - { label: Form, name: form, widget: string, required: false, hint: "id of a <form> to associate with, for Auto Submit and reset." }
                              - { label: Helper Text, name: helperText, widget: string, required: false }
                              - { label: Error Text, name: errorText, widget: string, required: false }
                              - { label: Count, name: count, widget: number, default: 4, hint: "Number of boxes to render." }
                              - label: Format
                                name: format
                                widget: select
                                options: [numeric, alphanumeric, alphabetic]
                                default: numeric
