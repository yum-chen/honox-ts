          - label: Combobox
            name: combobox
            widget: object
            fields: *combobox_fields
          - label: Menu
            name: menu
            widget: object
            fields: *menu_fields
          - label: PaginatedTable
            name: paginatedTable
            widget: object
            fields: *paginated_table_fields
          - label: Pagination
            name: pagination
            widget: object
            fields: *pagination_fields
          - label: Progress
            name: progress
            widget: object
            fields: *progress_fields
          - label: RadioGroup
            name: radioGroup
