                        types: *leaf_components
                        required: false
                      - { label: Confirm Text, name: confirmText, widget: string, required: false }
                      - { label: Cancel Text, name: cancelText, widget: string, required: false }
                      - label: Children
                        name: children
                        widget: list
                        types: *leaf_components
                        required: false

                  - label: Field
                    name: field
                    widget: object
                    fields: &field_fields
                      - { label: Label, name: label, widget: string, required: false }
                      - { label: Helper Text, name: helperText, widget: string, required: false }
                      - { label: Error Text, name: errorText, widget: string, required: false }
                      - { label: Disabled, name: disabled, widget: boolean, default: false }
                      - { label: Invalid, name: invalid, widget: boolean, default: false }
                      - { label: Read Only, name: readOnly, widget: boolean, default: false }
                      - { label: Required, name: required, widget: boolean, default: false }
                      - { label: Default Value, name: defaultValue, widget: string, required: false }
                      - label: Children
                        name: children
                        widget: list
                        types: *leaf_components
                        required: false

                  - label: Fieldset
                    name: fieldset
                    widget: object
                    fields: &fieldset_fields
                      - { label: Legend, name: legend, widget: string, required: false }
                      - { label: Helper Text, name: helperText, widget: string, required: false }
                      - { label: Error Text, name: errorText, widget: string, required: false }
                      - { label: Disabled, name: disabled, widget: boolean, default: false }
                      - { label: Invalid, name: invalid, widget: boolean, default: false }
                      - label: Children
                        name: children
                        widget: list
                        types: *leaf_components

                  - label: Group
                    name: group
                    widget: object
                    fields: &group_fields
                      - { label: Orientation, name: orientation, widget: select, options: [horizontal, vertical], default: horizontal }
                      - { label: Attached, name: attached, widget: boolean, default: false }
                      - { label: Grow, name: grow, widget: boolean, default: false }
                      - label: Children
                        name: children
                        widget: list
                        types: *leaf_components

                  - label: HoverCard
                    name: hovercard
                    widget: object
                    fields: &hover_card_fields
                      - { label: Trigger Text, name: triggerText, widget: string, required: false }
                      - label: Title, name: title, widget: string, required: false }
                      - { label: Description, name: description, widget: string, required: false }
                      - { label: Show Arrow, name: showArrow, widget: boolean, default: false }
                      - { label: Interactive, name: interactive, widget: boolean, default: true }
                      - label: Children
                        name: children
                        widget: list
                        types: *leaf_components
                        required: false

                  - label: Popover
                    name: popover
                    widget: object
                    fields: &popover_fields
                      - { label: Trigger Text, name: triggerText, widget: string, required: false }
                      - { label: Title, name: title, widget: string, required: false }
                      - { label: Description, name: description, widget: string, required: false }
                      - { label: Body, name: body, widget: string, required: false }
                      - { label: Footer, name: footer, widget: string, required: false }
                      - { label: Show Arrow, name: showArrow, widget: boolean, default: true }
                      - { label: Closable, name: closable, widget: boolean, default: true }
                      - { label: Interactive, name: interactive, widget: boolean, default: true }
                      - label: Children
                        name: children
                        widget: list
                        types: *leaf_components
                        required: false

                  - label: Button
                    name: button
                    widget: object
                    fields: *button_fields
                  - label: Badge
                    name: badge
                    widget: object
                    fields: *badge_fields
                  - label: Alert
                    name: alert
                    widget: object
                    fields: *alert_fields
                  - label: Heading
                    name: heading
                    widget: object
                    fields: *heading_fields
                  - label: Text
                    name: text
                    widget: object
                    fields: *text_fields
                  - label: Checkbox
                    name: checkbox
                    widget: object
                    fields: *checkbox_fields
                  - label: Combobox
                    name: combobox
                    widget: object
                    fields: *combobox_fields
                  - label: Menu
                    name: menu
                    widget: object
                    fields: *menu_fields
                  - label: PaginatedTable
                    name: paginatedTable
                    widget: object
                    fields: *paginated_table_fields
                  - label: Pagination
                    name: pagination
                    widget: object
                    fields: *pagination_fields
                  - label: Progress
                    name: progress
