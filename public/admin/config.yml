# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json

# Sveltia CMS Configuration
# Documentation: https://sveltiacms.app/en/docs/config-basics

# Backend Configuration
# Options: github, gitlab, gitea
# Update with your repository details
backend:
  name: github
  repo: yum-chen/honox-ts
  branch: main  # or master, depending on your default branch

# Media Storage
# Media files will be stored in /public/media and accessible at /media
media_folder: /public/media
public_folder: /media

# Collections - Define your content types here
collections:
  - name: posts
    label: Posts
    label_singular: Post
    folder: /content/posts
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime, type: date, default: "" }
      - { label: Description, name: description, widget: string }
      - { label: Body, name: body, widget: markdown }
      - label: Featured Image
        name: image
        widget: image
        required: false
      - label: Tags
        name: tags
        widget: list
        required: false
      - label: Draft
        name: draft
        widget: boolean
        default: false

  - name: pages
    label: Pages
    label_singular: Page
    folder: content/pages
    extension: json
    format: json
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - label: Content
        name: content
        widget: list
        types: &root_components
          # ==========================================
          # 1. STACK
          # ==========================================
          - label: Stack
            name: stack
            widget: object
            fields:
              - &stack_direction { label: Direction, name: direction, widget: select, options: [horizontal, vertical], default: horizontal }
              - &stack_align { label: Align, name: align, widget: select, options: [start, center, end, stretch, baseline], required: false }
              - &stack_justify { label: Justify, name: justify, widget: select, options: [start, center, end, between, around, evenly], required: false }
              - &stack_gap { label: Gap, name: gap, widget: select, options: ["0", "0.5", "1", "1.5", "2", "2.5", "3", "4", "5", "6", "7", "8", "9", "10", "12", "14", "16", "20"], default: "2" }
              - label: Children
                name: children
                widget: list
                types: &nestable_components
                  # Inside Level 1 containers, we can have another layer of containers or leaves
                  - label: Stack
                    name: stack
                    widget: object
                    fields:
                      - *stack_direction
                      - *stack_align
                      - *stack_justify
                      - *stack_gap
                      - label: Children
                        name: children
                        widget: list
                        types: &leaf_components
                          # Level 3: Non-container components (Leaves)
                          - label: Button
                            name: button
                            widget: object
                            fields: &button_fields
                              - { label: Text, name: text, widget: string }
                              - label: Variant
                                name: variant
                                widget: select
                                options: [solid, outline, subtle, surface, plain]
                                default: solid
                              - label: Color Palette
                                name: colorPalette
                                widget: select
                                options: [blue, green, red, purple, orange, amber, cyan, slate]
                                required: false
                              - label: Size
                                name: size
                                widget: select
                                options: [xs, sm, md, lg]
                                default: md
                          - label: Badge
                            name: badge
                            widget: object
                            fields: &badge_fields
                              - { label: Text, name: text, widget: string }
                              - label: Variant
                                name: variant
                                widget: select
                                options: [solid, subtle, outline, surface]
                                default: solid
                              - label: Color Palette
                                name: colorPalette
                                widget: select
                                options: [blue, green, red, purple, orange, amber, cyan, slate]
                                required: false
                              - label: Size
                                name: size
                                widget: select
                                options: [sm, md, lg]
                                default: md
                          - label: Alert
                            name: alert
                            widget: object
                            fields: &alert_fields
                              - { label: Title, name: title, widget: string }
                              - { label: Description, name: description, widget: string, required: false }
                              - label: Status
                                name: status
                                widget: select
                                options: [info, success, warning, error]
                                default: info
                              - label: Variant
                                name: variant
                                widget: select
                                options: [subtle, solid, outline, surface]
                                default: subtle
                          - label: Heading
                            name: heading
                            widget: object
                            fields: &heading_fields
                              - { label: Text, name: text, widget: string }
                              - label: Level
                                name: as
                                widget: select
                                options: [h1, h2, h3, h4, h5, h6]
                                default: h2
                              - label: Size
                                name: size
                                widget: select
                                options: [xs, sm, md, lg, xl, 2xl, 3xl, 4xl, 5xl, 6xl, 7xl]
                                default: xl
                          - label: Text
                            name: text
                            widget: object
                            fields: &text_fields
                              - { label: Content, name: content, widget: string }
                              - label: Size
                                name: size
                                widget: select
                                options: [xs, sm, md, lg, xl, 2xl, 3xl, 4xl, 5xl, 6xl, 7xl]
                                default: md
                          - label: Checkbox
                            name: checkbox
                            widget: object
                            fields: &checkbox_fields
                              - { label: Label, name: label, widget: string }
                              - { label: Checked, name: checked, widget: boolean, default: false }
                              - { label: Disabled, name: disabled, widget: boolean, default: false }
                              - { label: Invalid, name: invalid, widget: boolean, default: false }
                              - label: Size
                                name: size
                                widget: select
                                options: [sm, md, lg]
                                default: md
                              - label: Color Palette
                                name: colorPalette
                                widget: select
                                options: [blue, green, red, purple, orange, amber, cyan, slate]
                                required: false
                          - label: Combobox
                            name: combobox
                            widget: object
                            fields: &combobox_fields
                              - { label: Label, name: label, widget: string }
                              - { label: Placeholder, name: placeholder, widget: string, required: false }
                              - label: Items
                                name: items
                                widget: list
                                fields:
                                  - { label: Label, name: label, widget: string }
                                  - { label: Value, name: value, widget: string }
                          - label: Menu
                            name: menu
                            widget: object
                            fields: &menu_fields
                              - { label: Trigger Text, name: triggerText, widget: string, required: false }
                              - label: Items
                                name: items
                                widget: list
                                types:
                                  - label: Menu Item
                                    name: item
                                    widget: object
                                    fields:
                                      - { label: Label, name: label, widget: string }
                                      - { label: Value, name: value, widget: string }
                                      - { label: Disabled, name: disabled, widget: boolean, required: false }
                                  - label: Separator
                                    name: separator
                                    widget: object
                                    fields: []
                                  - label: Checkbox Item
                                    name: checkbox
                                    widget: object
                                    fields:
                                      - { label: Label, name: label, widget: string }
                                      - { label: Value, name: value, widget: string }
                                      - { label: Checked, name: checked, widget: boolean, required: false }
                                      - { label: Disabled, name: disabled, widget: boolean, required: false }
                          - label: PaginatedTable
                            name: paginatedTable
                            widget: object
                            fields: &paginated_table_fields []
                          - label: Pagination
                            name: pagination
                            widget: object
                            fields: &pagination_fields
                              - { label: Count, name: count, widget: number, default: 10 }
                              - { label: Page Size, name: pageSize, widget: number, default: 10 }
                              - { label: Default Page, name: defaultPage, widget: number, default: 1 }
                              - { label: Sibling Count, name: siblingCount, widget: number, default: 1 }
                              - { label: Boundary Count, name: boundaryCount, widget: number, default: 1 }
                              - { label: Interactive, name: interactive, widget: boolean, default: true }
                          - label: Progress
                            name: progress
                            widget: object
                            fields: &progress_fields
                              - { label: Label, name: label, widget: string, required: false }
                              - { label: Value, name: value, widget: number, default: 50 }
                              - { label: Min, name: min, widget: number, default: 0 }
                              - { label: Max, name: max, widget: number, default: 100 }
                              - { label: Type, name: type, widget: select, options: [linear, circular], default: linear }
                              - { label: Show Value Text, name: showValueText, widget: boolean, default: false }
                          - label: RadioGroup
                            name: radioGroup
                            widget: object
                            fields: &radio_group_fields
                              - { label: Label, name: label, widget: string, required: false }
                              - { label: Items
                                name: items
                                widget: list
                                fields:
                                  - { label: Label, name: label, widget: string }
                                  - { label: Value, name: value, widget: string }
                                  - { label: Disabled, name: disabled, widget: boolean, default: false }
                              - { label: Default Value, name: defaultValue, widget: string, required: false }
                              - { label: Value, name: value, widget: string, required: false }
                              - { label: Interactive, name: interactive, widget: boolean, default: true }
                          - label: SegmentGroup
                            name: segmentGroup
                            widget: object
                            fields: &segment_group_fields
                              - { label: Label, name: label, widget: string, required: false }
                              - { label: Items
                                name: items
                                widget: list
                                fields:
                                  - { label: Label, name: label, widget: string }
                                  - { label: Value, name: value, widget: string }
                                  - { label: Disabled, name: disabled, widget: boolean, default: false }
                              - { label: Default Value, name: defaultValue, widget: string, required: false }
                              - { label: Value, name: value, widget: string, required: false }
                              - { label: Interactive, name: interactive, widget: boolean, default: true }
                          - label: Slider
                            name: slider
                            widget: object
                            fields: &slider_fields
                              - { label: Label, name: label, widget: string, required: false }
                              - { label: Min, name: min, widget: number, default: 0 }
                              - { label: Max, name: max, widget: number, default: 100 }
                              - { label: Step, name: step, widget: number, default: 1 }
                              - { label: Default Value, name: defaultValue, widget: number, default: 50 }
                              - { label: Show Value Text, name: showValueText, widget: boolean, default: true }
                              - { label: Orientation, name: orientation, widget: select, options: [horizontal, vertical], default: horizontal }
                              - { label: Interactive, name: interactive, widget: boolean, default: true }
                          - label: Switch
                            name: switch
                            widget: object
                            fields: &switch_fields
                              - { label: Label, name: label, widget: string, required: false }
                              - { label: Default Checked, name: defaultChecked, widget: boolean, default: false }
                              - { label: Checked, name: checked, widget: boolean, default: false }
                              - { label: Disabled, name: disabled, widget: boolean, default: false }
                              - { label: Interactive, name: interactive, widget: boolean, default: true }
                          - label: Skeleton
                            name: skeleton
                            widget: object
                            fields: &skeleton_fields
                              - { label: Circle, name: circle, widget: boolean, default: false }
                              - { label: Number of Lines, name: noOfLines, widget: number, required: false }

                  - label: Card
                    name: card
                    widget: object
                    fields: &card_fields
                      - { label: Title, name: title, widget: string }
                      - { label: Description, name: description, widget: string, required: false }
                      - { label: Body, name: body, widget: string, required: false }
                      - { label: Image, name: image, widget: string, required: false }
                      - { label: Image Position, name: imagePosition, widget: select, options: [top, bottom, left, right], default: top }
                      - label: Children
                        name: children
                        widget: list
                        types: *leaf_components
                        required: false

                  - label: Collapsible
                    name: collapsible
                    widget: object
                    fields: &collapsible_fields
                      - { label: Trigger Text, name: triggerText, widget: string, required: false }
                      - label: Trigger Component
                        name: trigger
                        widget: list
                        types: *leaf_components
                        required: false
                      - { label: Show Indicator, name: showIndicator, widget: boolean, default: true }
                      - { label: Indicator Placement, name: indicatorPlacement, widget: select, options: [start, end], default: end }
                      - { label: Open, name: open, widget: boolean, default: false }
                      - { label: Disabled, name: disabled, widget: boolean, default: false }
                      - label: Children
                        name: children
                        widget: list
                        types: *leaf_components

                  - label: Dialog
                    name: dialog
                    widget: object
                    fields: &dialog_fields
                      - { label: Title, name: title, widget: string }
                      - { label: Description, name: description, widget: string, required: false }
                      - { label: Trigger Text, name: triggerText, widget: string, required: false }
                      - label: Trigger Component
                        name: trigger
                        widget: list
                        types: *leaf_components
                        required: false
                      - { label: Confirm Text, name: confirmText, widget: string, required: false }
                      - { label: Cancel Text, name: cancelText, widget: string, required: false }
                      - { label: Role, name: role, widget: select, options: [dialog, alertdialog], default: dialog }
                      - label: Children
                        name: children
                        widget: list
                        types: *leaf_components
                        required: false

                  - label: Drawer
                    name: drawer
